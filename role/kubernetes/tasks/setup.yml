# Enable netfilter Linux kernel module.
- name: Enable netfilter Linux kernel module
  become: true
  command: modprobe br_netfilter
  tags:
    - setup

# Set required network and swap Linux kernel params.
- name: Set required network and swap Linux kernel params
  become: true
  copy:
    src: kernel.conf
    dest: /etc/sysctl.d/kubernetes.conf
    owner: root
    group: root
    mode: 0600
  tags:
    - setup

# Apply required network and swap Linux kernel params.
- name: Apply required network and swap Linux kernel params
  become: true
  command: sysctl --system
  tags:
    - setup

# Add Kubernetes repository to package manager source list.
- name: Add Kubernetes repository to package manager source list
  become: true
  copy:
    src: yum.repo
    dest: /etc/yum.repos.d/kubernetes.repo
    owner: root
    group: root
    mode: 0600
  tags:
    - setup

# Install Kubernetes packages from repository.
- name: Install Kubernetes packages from repository
  become: true
  yum:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes
  tags:
    - setup

# Create Kubernetes client configuration directory.
- name: Create Kubernetes client configuration directory
  become: true
  file:
    path: "{{kubernetes.client.conf_dir}}"
    state: directory
    owner: vagrant
    group: vagrant
    recurse: true
    mode: 0755
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  tags:
    - setup

# Set private IP on Kubernetes master node in /etc/sysconfig/kubelet
- name: Set private IP for Kubernetes master node
  become: true
  lineinfile:
    path: /etc/sysconfig/kubelet
    state: present
    regexp: '^KUBELET_EXTRA_ARGS='
    line: 'KUBELET_EXTRA_ARGS=--node-ip={{kubernetes.network.master_ip}}'
  when: inventory_hostname in groups['kubernetes_master']
  tags:
    - setup

# Set private IP on Kubernetes worker node in /etc/sysconfig/kubelet
- name: Set private IP for Kubernetes master node
  become: true
  lineinfile:
    path: /etc/sysconfig/kubelet
    state: present
    regexp: '^KUBELET_EXTRA_ARGS='
    line: 'KUBELET_EXTRA_ARGS=--node-ip={{kubernetes.network.worker_ip}}'
  when: inventory_hostname in groups['kubernetes_worker']
  tags:
    - setup

# Enable and Restart Kubelet service.
- name: Restart Kubelet service
  become: true
  systemd:
    name: kubelet
    enabled: yes
    state: restarted
  tags:
    - setup