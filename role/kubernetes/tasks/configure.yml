# Initialize Kubernetes cluster.
- name: Initialize Kubernetes cluster
  become: true
  command: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ansible_eth0.ipv4.address}} --cri-socket=unix:///var/run/cri-dockerd.sock
  args:
    creates: /etc/kubernetes/admin.conf
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-2 
  tags:
    - configure

# Configure Kubernetes client with admin user credentials.
- name: Configure Kubernetes client with admin user credentials
  become: true
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{kubernetes.client.conf_dir}}/config"
    owner: vagrant
    group: vagrant
    remote_src: yes
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-2 
  tags:
    - configure

# Create Flannel network in Kubernetes cluster.
- name: Create Flannel network in Kubernetes cluster
  command: kubectl apply -f {{kubernetes.network.flannel}}
  become_user: vagrant
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-2 
  tags:
    - configure

# Generate token in Kubernetes cluster.
- name: Generate token in Kubernetes cluster
  become: true
  command: kubeadm token create --kubeconfig=/etc/kubernetes/admin.conf --print-join-command
  register: kubernetes_worker_join_cmd
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-2
  tags:
    - configure

# Print the join command token
- name: Debug the join command token
  debug:
    msg: "{{ kubernetes_worker_join_cmd.stdout }}"
  when: kubernetes_worker_join_cmd is defined and kubernetes_worker_join_cmd.stdout is defined
  tags:
    - configure
