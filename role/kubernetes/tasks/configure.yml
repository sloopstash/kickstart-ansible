# Set private IP on Kubernetes worker node in /etc/sysconfig/kubelet
- name: Set private IP for Kubernetes master node
  become: true
  lineinfile:
    path: "{{ kubernetes.network.kubelet.conf_dir }}/kubelet"
    state: present
    regexp: '^KUBELET_EXTRA_ARGS='
    line: "KUBELET_EXTRA_ARGS=--node-ip={{ ansible_eth1.ipv4.address }}"
  tags:
    - configure

# Enable and Restart Kubelet service.
- name: Restart Kubelet service
  become: true
  systemd:
    name: kubelet
    enabled: yes
    state: restarted
  tags:
    - configure

# Check if Kubernetes admin.conf exists (to verify if cluster is already initialized)
- name: Check if Kubernetes admin.conf exists
  become: true
  stat:
    path: "{{ kubernetes.conf_dir }}/admin.conf"
  register: kubernetes_cluster_check
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-1 
  tags:
    - configure

# Initialize Kubernetes cluster.
- name: Initialize Kubernetes cluster
  become: true
  command: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ ansible_eth1.ipv4.address }} --cri-socket=unix:///var/run/cri-dockerd.sock
  args:
    creates: "{{ kubernetes.conf_dir }}/admin.conf"
  run_once: true
  when: 
    - inventory_hostname in groups['kubernetes_master']
    - not kubernetes_cluster_check.stat.exists
  delegate_to: sloopstash-k8s-mtr-1
  tags:
    - configure

# Configure Kubernetes client with admin user credentials.
- name: Configure Kubernetes client with admin user credentials
  become: true
  copy:
    src: "{{ kubernetes.conf_dir }}/admin.conf"
    dest: "{{ kubernetes.client.conf_dir }}/config"
    owner: vagrant
    group: vagrant
    remote_src: yes
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-1
  tags:
    - configure

# Create Flannel network in Kubernetes cluster.
- name: Create Flannel network in Kubernetes cluster
  command: "kubectl apply -f {{ kubernetes.network.flannel }}"
  become_user: vagrant
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-1
  tags:
    - configure

# Generate toke to join worker node.
- name: generate toke to join worker node
  become: true
  command: "kubeadm token create --kubeconfig={{ kubernetes.conf_dir }}/admin.conf --print-join-command"
  register: wkr_nd_join_cmd
  run_once: true
  when: inventory_hostname in groups['kubernetes_master']
  delegate_to: sloopstash-k8s-mtr-1
  tags:
    - configure

# Check if kubelet.conf exists (to verify if worker node is already joined)
- name: Check if kubelet.conf exists
  become: true
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf_check
  run_once: true
  when: inventory_hostname in groups['kubernetes_worker']
  tags:
    - configure

# Join worker node.
- name: join worker node
  become: true
  command: "{{hostvars['sloopstash-k8s-mtr-1']['wkr_nd_join_cmd']['stdout']}}  --cri-socket=unix:///var/run/cri-dockerd.sock"
  when: 
    - inventory_hostname in groups['kubernetes_worker']
    - not kubelet_conf_check.stat.exists
  tags:
    - configure


